name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # >=23.6 for unflagged TS type-stripping (prerender script)
          cache: npm

      - run: npm ci

      # Derive the base path and canonical origin from the repository so the
      # build works whether this is a project site (/<repo>/) or a user/org
      # site (<owner>.github.io served from /).
      - name: Compute base path and origin
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          OWNER_LC="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          if [ "$REPO" = "${OWNER_LC}.github.io" ]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
            echo "SITE_ORIGIN=https://${OWNER_LC}.github.io" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/${REPO}/" >> "$GITHUB_ENV"
            echo "SITE_ORIGIN=https://${OWNER_LC}.github.io/${REPO}" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
